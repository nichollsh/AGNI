# This job installs AGNI and SOCRATES, and tests AGNI
# This occurs when a PR to main is created

name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

env:
  CODECOV_TOKEN: 1f20e5bd-6449-4538-b29d-ae16e0ba5b99

jobs:
  install_and_test:

    if: github.event.pull_request.draft == false

    permissions:
      contents: read
      pull-requests: write

    runs-on: ${{ matrix.os }}
    name: install_and_test

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        julia-version: ['1.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Setup system
      - name: NetCDF Ubuntu
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt update
          sudo apt-get install libnetcdff-dev netcdf-bin gfortran gcc

      - name: NetCDF macOS
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          brew update
          brew install netcdf netcdf-fortran gfortran gcc
          echo 'eval $(/opt/homebrew/bin/brew shellenv)' >> ~/.zprofile

      # Setup Julia
      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia
        uses: julia-actions/cache@v3


      # Setup SOCRATES
      - name: Get SOCRATES
        uses: actions/checkout@v6
        with:
          repository: 'FormingWorlds/SOCRATES'
          path: 'SOCRATES'

      - name: Restore SOCRATES from cache
        uses: actions/cache@v5
        id: cache-socrates
        with:
          path: SOCRATES/
          key: socrates[${{ hashFiles('SOCRATES/version') }}]-os[${{ runner.os }}]-julia[${{ matrix.julia-version }}]
          restore-keys: socrates[${{ hashFiles('SOCRATES/version') }}]-os[${{ runner.os }}]-julia-[${ matrix.julia-version }}]

      - name: Build SOCRATES if required
        if: steps.cache-socrates.outputs.cache-hit != 'true'
        run: |
          export LD_LIBRARY_PATH=""
          export RAD_DIR="$HOME/work/AGNI/AGNI/SOCRATES"
          cd $RAD_DIR
          ./configure
          ./build_code
          cd ..

      - name: Get FastChem
        run: ./src/get_fastchem.sh -y

      - name: Build AGNI
        run: |
          export RAD_DIR="$HOME/work/AGNI/AGNI/SOCRATES"
          export RAD_BIN="$RAD_DIR/bin/"
          export LD_LIBRARY_PATH=""
          export FC=$(command -v gfortran)
          julia --project -e 'using Pkg; Pkg.build()'

      # Run the tests
      - name: Run AGNI test suite
        run: |
          export RAD_DIR="$HOME/work/AGNI/AGNI/SOCRATES"
          export FC_DIR="$HOME/work/AGNI/AGNI/fastchem"
          export LD_LIBRARY_PATH=""
          julia --project --code-coverage test/runtests.jl
      
      # Get coverage when running on linux
      - name: Get coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.julia-version == '1.12' }}
        run: |
          export CODECOV_TOKEN="${{ secrets.CODECOV_TOKEN }}"
          julia --project test/runcoverage.jl
          export total=$(cat coverage.total)
          echo "total=$total" >> $GITHUB_ENV
          cat coverage.md >> "$GITHUB_STEP_SUMMARY"

      # Upload output dir for inspection by user
      - name: Upload result as artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-artifact
          path: |
            out/*
            coverage.*
            .github/badges/tests-*.json

      - name: Publish test badges to gist
        if: ${{ (matrix.os == 'ubuntu-latest') && (matrix.julia-version == '1.12' ) && (github.event_name == 'push') && (github.ref == 'refs/heads/main') }}
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          set -e
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          gist_id = "e20f4fa3c7811c75d34005311fef3696"
          token = os.environ.get("GIST_TOKEN", "").strip()
          if not token:
              raise RuntimeError("GIST_TOKEN is not set")

          badge_files = ["tests-unit.json", "tests-integration.json", "tests-total.json"]
          files = {}
          for name in badge_files:
              p = Path(".github/badges") / name
              files[name] = {"content": p.read_text(encoding="utf-8")}

          payload = json.dumps({"files": files}).encode("utf-8")
          req = Request(
              url=f"https://api.github.com/gists/{gist_id}",
              data=payload,
              method="PATCH",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
              },
          )
          with urlopen(req) as resp:
              if resp.status != 200:
                  raise RuntimeError(f"Failed to update gist, status={resp.status}")
          PY

