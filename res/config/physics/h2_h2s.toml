# AGNI configuration file
title = "H2 + H2S test"

[planet]
    tmp_surf        = 1700.0
    instellation    = 13680.0
    albedo_b        = 0.0
    s0_fact         = 0.375
    zenith_angle    = 48.19
    surface_material= "res/surface_albedos/lunarmarebasalt.dat"
    albedo_s        = 0.0
    radius          = 16628310.0
    gravity         = 12.43
    flux_int        = 0.0
    roughness       = 1.0e-2
    wind_speed      = 10.0

[files]
    input_sf        = "res/spectral_files/Honeyside/256/Honeyside.sf"
    input_star      = "res/stellar_spectra/sun.txt"
    output_dir      = "out/"

[composition]
    p_surf          = 1e3
    p_top           = 1e-5
    vmr_dict        = { H2=0.999, H2S=0.001 }
    condensates     = []

[execution]
    clean_output    = true
    verbosity       = 1
    max_steps       = 200
    max_runtime     = 400
    num_levels      = 40
    solution_type   = 3
    solver          = "newton"
    dx_max          = 500.0
    initial_state   = ["ncdf","nogit_h2s/out_01.0/atm.nc"]
    linesearch      = 2
    easy_start      = false
    grey_start      = false
    converge_atol   = 1e-1
    converge_rtol   = 1.0e-3
    perturb_all     = true

[physics]
    chemistry       = false
    continua        = true
    rayleigh        = true
    cloud           = false
    overlap_method  = "ee"
    real_gas        = true
    thermo_funct    = true
    sensible_heat   = true
    conduction      = true
    latent_heat     = false
    convection      = true
    convection_crit = "s"
    rainout         = false
    oceans          = false

[plots]
    at_runtime      = true
    temperature     = true
    fluxes          = true
    contribution    = true
    emission        = true
    albedo          = true
    mixing_ratios   = true
    animate         = false
    height          = false
    cloud           = false
