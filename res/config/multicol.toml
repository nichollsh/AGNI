# AGNI configuration file
title = "Multicolumn example"

[planet]
    tmp_surf        = 2000.0
    instellation    = 44000.0
    albedo_b        = 0.18
    s0_fact         = 0.6652
    zenith_angle    = 60.0
    surface_material= "res/surface_albedos/lunarmarebasalt.dat"
    albedo_s        = 0.0
    radius          = 6.37e6
    gravity         = 9.81
    flux_int        = 0.0
    roughness       = 1.0e-2
    wind_speed      = 10.0

    [planet.globe]
        lons        = [  0.0,  60.0,  90.0, 180.0]      # longitudes [deg]
        lats        = [  0.0,   0.0,   0.0,   0.0]      # latitudes [deg]
        redist_flux = [ -3.0,  -2.0,   2.0,   3.0]      # heat entering this column [W m-2]

[files]
    input_sf        = "res/spectral_files/Frostflow/16/Frostflow.sf"
    input_star      = "res/stellar_spectra/sun.txt"
    output_dir      = "out/"

[composition]
    p_surf          = 1000.0
    p_top           = 1e-4
    vmr_dict        = { H2O = 1.0}
    condensates     = []

[execution]
    clean_output    = true
    verbosity       = 1
    max_steps       = 200
    globe_iters     = 5
    max_runtime     = 400
    num_levels      = 35
    solution_type   = 3
    solver          = "newton"
    dx_max          = 200.0
    initial_state   = ["loglin","1000"]
    linesearch      = 2
    easy_start      = false
    grey_start      = false
    converge_atol   = 1.0e-2
    converge_rtol   = 1.0e-4
    perturb_all     = false

[physics]
    chemistry       = false
    continua        = true
    rayleigh        = true
    cloud           = false
    overlap_method  = "ee"
    real_gas        = false
    thermo_funct    = true
    sensible_heat   = true
    conduction      = true
    latent_heat     = false
    convection      = false  # <-- !!
    convection_crit = "l"
    rainout         = false
    oceans          = false
    grey_lw         = 5e-3
    grey_sw         = 2e-3

[plots]
    extension       = "pdf"
    at_runtime      = true
    temperature     = true
    fluxes          = true
    contribution    = true
    emission        = true
    albedo          = true
    mixing_ratios   = true
    animate         = false
    height          = true
    cloud           = false
    globe           = true
